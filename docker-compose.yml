version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./eyeguard.db:/app/eyeguard.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  bot:
    build: .
    command: node dist/bot/bot.js
    env_file:
      - .env
    volumes:
      - ./eyeguard.db:/app/eyeguard.db
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
